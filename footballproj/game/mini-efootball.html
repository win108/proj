<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Mini eFootball - Top Down 2D</title>
<style>
  :root{
    --pitch-dark:#0b3d24;
    --pitch-light:#0f4d2d;
    --line:#e8f5ec;
    --home:#1e5fd9;
    --home-dark:#123c8c;
    --away:#d9291e;
    --away-dark:#8c1712;
    --ink:#eef2ea;
    --panel:#08110c;
    --gold:#f2c14e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:#04140a;
    font-family:Tahoma, "Segoe UI", sans-serif;
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    overflow:hidden;
  }
  #wrap{
    display:flex;flex-direction:column;align-items:center;
    padding:16px;gap:10px;width:100%;
  }
  #scoreboard{
    display:flex;align-items:center;justify-content:center;gap:0;
    background:var(--panel);
    border:2px solid #1a2b1e;
    border-radius:10px;
    padding:8px 4px;
    box-shadow:0 6px 18px rgba(0,0,0,.5);
    user-select:none;
  }
  .team-tag{
    display:flex;align-items:center;gap:8px;
    padding:6px 18px;
    font-weight:bold;
    font-size:20px;
    letter-spacing:1px;
  }
  .team-tag.home{color:var(--home);}
  .team-tag.away{color:var(--away);}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .dot.home{background:var(--home);}
  .dot.away{background:var(--away);}
  #score{
    font-size:30px;font-weight:bold;
    padding:0 16px;
    color:var(--gold);
    min-width:90px;text-align:center;
    letter-spacing:2px;
  }
  #timer{
    font-size:13px;color:#9db3a1;margin-left:10px;padding-right:6px;
  }
  canvas{
    background:var(--pitch-dark);
    border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
    border:3px solid #123018;
  }
  #help{
    color:#9db3a1;
    font-size:13px;
    text-align:center;
    max-width:900px;
    line-height:1.6;
  }
  #help b{color:var(--ink);}
  #help .k{
    background:#132417;border:1px solid #244a30;border-radius:4px;
    padding:1px 7px;font-weight:bold;color:var(--gold);
  }
  #goalFlash{
    position:fixed;top:0;left:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
    font-size:80px;font-weight:900;color:var(--gold);
    text-shadow:0 0 20px rgba(0,0,0,.8), 0 0 40px var(--gold);
    letter-spacing:6px;
    opacity:0;
    transition:opacity .2s;
    z-index:10;
  }
  #goalFlash.show{opacity:1;}
</style>
</head>
<body>
<div id="wrap">
  <div id="scoreboard">
    <div class="team-tag home"><span class="dot home"></span>HOME</div>
    <div id="score">0 : 0</div>
    <div class="team-tag away">AWAY<span class="dot away"></span></div>
    <div id="timer">00:00</div>
  </div>

  <canvas id="pitch" width="900" height="600"></canvas>

  <div id="help">
    <b>บังคับผู้เล่นที่มีวงกลมสีทองอยู่เหนือหัว</b> &nbsp;|&nbsp;
    เคลื่อนที่: <span class="k">W A S D</span> หรือ <span class="k">↑ ↓ ← →</span> &nbsp;|&nbsp;
    ส่งบอล: <span class="k">J</span> &nbsp;|&nbsp;
    ยิงประตู: <span class="k">K</span>
  </div>
</div>

<div id="goalFlash">GOAL!</div>

<script>
/* =========================================================================
   MINI eFOOTBALL - Top-down 2D football game (Vanilla JS + Canvas)
   Single-file implementation. All game logic lives in this script tag.
   ========================================================================= */

const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const goalFlashEl = document.getElementById('goalFlash');

// ----------------------------- FIELD LAYOUT -----------------------------
const FIELD = {
  left: 50, right: 850, top: 50, bottom: 550,
  get width() { return this.right - this.left; },
  get height() { return this.bottom - this.top; },
  centerX: 450, centerY: 300,
};
// Goal mouth (the scoring gap) centered vertically on each goal line
const GOAL_HALF = 65; // half height of goal mouth
const GOAL = {
  topY: FIELD.centerY - GOAL_HALF,
  bottomY: FIELD.centerY + GOAL_HALF,
  depth: 22, // how far the goal net sticks out behind the boundary line
};
// Penalty box dimensions
const BOX = { width: 130, height: 260 };

// ----------------------------- GAME STATE -------------------------------
let scoreHome = 0, scoreAway = 0;
let matchSeconds = 0;
let lastTouchTeam = 'home'; // which team touched the ball last (kickoff possession helper)
let goalPauseFrames = 0;    // freeze gameplay briefly after a goal
let controlledIndex = 3;    // index into players[] of the human-controlled player (a home forward)

// Keys currently held down
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// One-shot press detection for pass/shoot so holding the key doesn't spam it
let jPrev = false, kPrev = false;

// Frame-rate independent scaling factor (1.0 == a perfect 60fps frame).
// Recalculated every frame in the game loop from the real elapsed time,
// so movement stays smooth and consistent even if the browser's refresh
// rate isn't exactly 60Hz.
let dtScale = 1;

// ----------------------------- ENTITIES ---------------------------------
// A "Player" is either a field player or a goalkeeper (role: 'GK' or 'FIELD')
function makePlayer(team, role, homeX, homeY, num) {
  return {
    team, role, num,
    x: homeX, y: homeY,
    homeX, homeY,       // formation "slot" position used as an anchor for AI movement
    vx: 0, vy: 0,       // current smoothed movement velocity (px/frame @60fps)
    r: 19,
    speed: role === 'GK' ? 2.6 : (team === 'home' ? 3.3 : 3.1),
    facing: team === 'home' ? 0 : Math.PI, // radians; used for passing direction
    kickCooldown: 0,    // prevents re-kicking the ball the instant it's near the player again
  };
}

let players = [];
function setupFormation() {
  players = [
    // ---- HOME TEAM (blue) - attacks the RIGHT goal ----
    makePlayer('home', 'GK',    110, 300, 1),
    makePlayer('home', 'FIELD', 260, 200, 2),  // upper wide player
    makePlayer('home', 'FIELD', 260, 400, 3),  // lower wide player
    makePlayer('home', 'FIELD', 430, 300, 4),  // <- default controlled player (central forward)

    // ---- AWAY TEAM (red) - attacks the LEFT goal ----
    makePlayer('away', 'GK',    790, 300, 1),
    makePlayer('away', 'FIELD', 640, 400, 2),
    makePlayer('away', 'FIELD', 640, 200, 3),
    makePlayer('away', 'FIELD', 470, 300, 4),
  ];
}
setupFormation();

const ball = {
  x: FIELD.centerX, y: FIELD.centerY, vx: 0, vy: 0, r: 7,
  friction: 0.985,
};

function resetKickoff(scoringTeam) {
  setupFormation();
  ball.x = FIELD.centerX; ball.y = FIELD.centerY; ball.vx = 0; ball.vy = 0;
  lastTouchTeam = scoringTeam === 'home' ? 'away' : 'home';
}

// ----------------------------- HELPERS ----------------------------------
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function teammates(team) { return players.filter(p => p.team === team); }
function opponents(team) { return players.filter(p => p.team !== team); }

// Find which player is closest to the ball (used to infer "possession")
function nearestPlayerToBall() {
  let best = null, bestD = Infinity;
  for (const p of players) {
    const d = dist(p.x, p.y, ball.x, ball.y);
    if (d < bestD) { bestD = d; best = p; }
  }
  return { player: best, dist: bestD };
}

function currentPossessionTeam() {
  const { player, dist: d } = nearestPlayerToBall();
  return d < 40 ? player.team : lastTouchTeam;
}

// ----------------------------- INPUT: CONTROLLED PLAYER ------------------
function handleControlledPlayer() {
  const p = players[controlledIndex];
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  // Target velocity is either full speed toward the input direction, or zero (to decelerate)
  let targetVx = 0, targetVy = 0;
  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    targetVx = (dx / len) * p.speed;
    targetVy = (dy / len) * p.speed;
  }
  // Ease current velocity toward the target - this removes the "snappy/robotic" feel
  const ease = 0.28 * dtScale;
  p.vx += (targetVx - p.vx) * ease;
  p.vy += (targetVy - p.vy) * ease;

  p.x += p.vx * dtScale;
  p.y += p.vy * dtScale;
  if (Math.hypot(p.vx, p.vy) > 0.15) {
    p.facing = Math.atan2(p.vy, p.vx); // remember direction the player is facing
  }
  // Keep the controlled player inside the pitch boundary
  p.x = clamp(p.x, FIELD.left + p.r, FIELD.right - p.r);
  p.y = clamp(p.y, FIELD.top + p.r, FIELD.bottom - p.r);

  // ---- PASS (J) ----
  const jNow = !!keys['j'];
  if (jNow && !jPrev) tryPass(p);
  jPrev = jNow;

  // ---- SHOOT (K) ----
  const kNow = !!keys['k'];
  if (kNow && !kPrev) tryShoot(p);
  kPrev = kNow;
}

// Pass the ball toward the nearest teammate roughly in front of the player
function tryPass(p) {
  if (dist(p.x, p.y, ball.x, ball.y) > 34) return; // must be close to the ball
  const mates = teammates(p.team).filter(m => m !== p);
  let target = null, bestScore = -Infinity;
  for (const m of mates) {
    const ang = Math.atan2(m.y - p.y, m.x - p.x);
    let diff = Math.abs(ang - p.facing);
    if (diff > Math.PI) diff = 2 * Math.PI - diff;
    // Prefer teammates within a forward-facing cone; fall back to nearest otherwise
    if (diff < Math.PI / 2.1) {
      const d = dist(p.x, p.y, m.x, m.y);
      const score = 500 - d - diff * 80;
      if (score > bestScore) { bestScore = score; target = m; }
    }
  }
  if (!target) {
    // nobody in the facing cone -> just pick the nearest teammate
    target = mates.reduce((a, b) => dist(p.x, p.y, a.x, a.y) < dist(p.x, p.y, b.x, b.y) ? a : b);
  }
  const ang = Math.atan2(target.y - p.y, target.x - p.x);
  const power = 7.2;
  ball.vx = Math.cos(ang) * power;
  ball.vy = Math.sin(ang) * power;
  lastTouchTeam = p.team;
  p.kickCooldown = 12;
}

// Shoot straight toward the center of the opponent's goal
function tryShoot(p) {
  if (dist(p.x, p.y, ball.x, ball.y) > 36) return;
  const targetX = p.team === 'home' ? FIELD.right : FIELD.left;
  const targetY = FIELD.centerY + (Math.random() * 40 - 20); // slight natural variance
  const ang = Math.atan2(targetY - p.y, targetX - p.x);
  const power = 11.5;
  ball.vx = Math.cos(ang) * power;
  ball.vy = Math.sin(ang) * power;
  lastTouchTeam = p.team;
  p.kickCooldown = 12;
}

// ----------------------------- AI: TEAMMATES (non-controlled home) -------
function updateTeammateAI(p) {
  const possession = currentPossessionTeam();
  if (possession === p.team) {
    // Our team has the ball -> move to open space ahead, keeping formation shape,
    // drifting slightly toward the ball's lane so passing lanes stay realistic.
    const forwardBias = p.team === 'home' ? 60 : -60;
    const targetX = clamp(p.homeX + (ball.x - FIELD.centerX) * 0.25 + forwardBias * 0.2,
                           FIELD.left + 30, FIELD.right - 30);
    const targetY = clamp(p.homeY + (ball.y - p.homeY) * 0.3, FIELD.top + 25, FIELD.bottom - 25);
    moveToward(p, targetX, targetY, p.speed * 0.85);
  } else {
    // Opponent has the ball -> only the single closest teammate presses the ball
    // (limit: a team may only send ONE player to chase the ball at a time),
    // everyone else recovers toward defensive shape.
    const mates = teammates(p.team).filter(m => m.role !== 'GK');
    const sorted = mates.slice().sort((a, b) => dist(a.x, a.y, ball.x, ball.y) - dist(b.x, b.y, ball.x, ball.y));
    if (sorted[0] === p) {
      moveToward(p, ball.x, ball.y, p.speed);
    } else {
      moveToward(p, p.homeX, p.homeY, p.speed * 0.7);
    }
  }
}

// ----------------------------- AI: OPPONENT TEAM (fully AI-controlled) ---
function updateOpponentFieldAI(p) {
  const possession = currentPossessionTeam();
  if (possession === p.team) {
    // Away team attacks toward the LEFT goal when it's 'away', RIGHT when 'home'.
    const goalX = p.team === 'home' ? FIELD.right : FIELD.left;
    const ballCarrier = nearestPlayerToBall().player;
    if (ballCarrier === p) {
      // Dribble the ball carrier toward the opponent goal
      moveToward(p, goalX, FIELD.centerY, p.speed);
      const distToGoal = Math.abs(goalX - p.x);
      if (distToGoal < 190 && dist(p.x, p.y, ball.x, ball.y) < 34) {
        // Close enough to goal -> shoot
        aiShoot(p, goalX);
      } else if (dist(p.x, p.y, ball.x, ball.y) < 34 && Math.random() < 0.01) {
        // Occasionally pass to keep it dynamic
        aiPass(p);
      }
    } else {
      // Off-ball teammates push forward into space
      const targetX = clamp(p.homeX + (ball.x - FIELD.centerX) * 0.25, FIELD.left + 30, FIELD.right - 30);
      moveToward(p, targetX, p.homeY, p.speed * 0.85);
    }
  } else {
    // Defend: only the single closest player presses the ball, rest hold shape
    // (limit: a team may only send ONE player to chase the ball at a time)
    const mates = teammates(p.team).filter(m => m.role !== 'GK');
    const sorted = mates.slice().sort((a, b) => dist(a.x, a.y, ball.x, ball.y) - dist(b.x, b.y, ball.x, ball.y));
    if (sorted[0] === p) {
      moveToward(p, ball.x, ball.y, p.speed);
    } else {
      moveToward(p, p.homeX, p.homeY, p.speed * 0.7);
    }
  }
}

function aiPass(p) {
  const mates = teammates(p.team).filter(m => m !== p && m.role !== 'GK');
  if (mates.length === 0) return;
  const target = mates.reduce((a, b) => dist(p.x, p.y, a.x, a.y) < dist(p.x, p.y, b.x, b.y) ? a : b);
  const ang = Math.atan2(target.y - p.y, target.x - p.x);
  ball.vx = Math.cos(ang) * 7; ball.vy = Math.sin(ang) * 7;
  lastTouchTeam = p.team;
  p.kickCooldown = 12;
}

function aiShoot(p, goalX) {
  const targetY = FIELD.centerY + (Math.random() * 50 - 25);
  const ang = Math.atan2(targetY - p.y, goalX - p.x);
  ball.vx = Math.cos(ang) * 11; ball.vy = Math.sin(ang) * 11;
  lastTouchTeam = p.team;
  p.kickCooldown = 12;
}

// ----------------------------- AI: GOALKEEPERS ----------------------------
function updateGoalkeeper(p) {
  const ownGoalX = p.team === 'home' ? FIELD.left + 24 : FIELD.right - 24;
  // GK shifts up/down tracking the ball, but stays anchored near the goal line
  const targetY = clamp(ball.y, GOAL.topY + 10, GOAL.bottomY - 10);
  // If the ball is dangerously close, the GK can step out slightly to close the angle
  const ballNearGoal = Math.abs(ball.x - ownGoalX) < 140;
  const targetX = ballNearGoal ? ownGoalX + (p.team === 'home' ? 1 : -1) * 12 : ownGoalX;
  moveToward(p, targetX, targetY, p.speed);
}

// Generic "move toward a target point" helper shared by AI routines.
// Uses eased velocity (instead of snapping position directly) so AI players
// accelerate/decelerate smoothly rather than jittering frame to frame.
function moveToward(p, tx, ty, spd) {
  const dx = tx - p.x, dy = ty - p.y;
  const d = Math.hypot(dx, dy);
  let targetVx = 0, targetVy = 0;
  if (d > 2) {
    // Slow down gracefully as the player nears its target instead of overshooting/jittering
    const slowRadius = 24;
    const scale = d < slowRadius ? Math.max(0.25, d / slowRadius) : 1;
    targetVx = (dx / d) * spd * scale;
    targetVy = (dy / d) * spd * scale;
  }
  const ease = 0.22 * dtScale;
  p.vx += (targetVx - p.vx) * ease;
  p.vy += (targetVy - p.vy) * ease;
  p.x += p.vx * dtScale;
  p.y += p.vy * dtScale;
  if (Math.hypot(p.vx, p.vy) > 0.15) {
    p.facing = Math.atan2(p.vy, p.vx);
  }
  p.x = clamp(p.x, FIELD.left + p.r, FIELD.right - p.r);
  p.y = clamp(p.y, FIELD.top + p.r, FIELD.bottom - p.r);
}

// ----------------------------- PHYSICS: BALL & COLLISIONS ------------------
function updateBall() {
  ball.x += ball.vx * dtScale;
  ball.y += ball.vy * dtScale;
  const f = Math.pow(ball.friction, dtScale);
  ball.vx *= f;
  ball.vy *= f;
  if (Math.abs(ball.vx) < 0.02) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.02) ball.vy = 0;

  let bounced = false;
  if (ball.y - ball.r < FIELD.top) {
    ball.y = FIELD.top + ball.r;
    ball.vx = 0;
    ball.vy = 0;
    bounced = true;
  }
  if (ball.y + ball.r > FIELD.bottom) {
    ball.y = FIELD.bottom - ball.r;
    ball.vx = 0;
    ball.vy = 0;
    bounced = true;
  }

  const inGoalMouth = ball.y > GOAL.topY && ball.y < GOAL.bottomY;

  if (ball.x - ball.r < FIELD.left && !inGoalMouth) {
    ball.x = FIELD.left + ball.r;
    ball.vx = 0;
    ball.vy = 0;
    bounced = true;
  }
  if (ball.x + ball.r > FIELD.right && !inGoalMouth) {
    ball.x = FIELD.right - ball.r;
    ball.vx = 0;
    ball.vy = 0;
    bounced = true;
  }

  if (bounced) return;

  // Goal detection
  if (inGoalMouth && ball.x - ball.r < FIELD.left - GOAL.depth) {
    scoreGoal('away');
  } else if (inGoalMouth && ball.x + ball.r > FIELD.right + GOAL.depth) {
    scoreGoal('home');
  }
}

function scoreGoal(team) {
  if (team === 'home') scoreHome++; else scoreAway++;
  updateScoreboard();
  goalFlashEl.classList.add('show');
  goalPauseFrames = 90; // ~1.5s pause at 60fps
  setTimeout(() => goalFlashEl.classList.remove('show'), 1400);
  resetKickoff(team);
}

function keepPlayersOutOfGoalZones() {
  for (const p of players) {
    if (p.role === 'GK') continue;

    const inHomeGoal = p.x < FIELD.left + 2 && p.y > GOAL.topY && p.y < GOAL.bottomY;
    const inAwayGoal = p.x > FIELD.right - 2 && p.y > GOAL.topY && p.y < GOAL.bottomY;

    if (inHomeGoal) {
      p.x = FIELD.left + 2;
    } else if (inAwayGoal) {
      p.x = FIELD.right - 2;
    }
  }
}

function updateScoreboard() {
  scoreEl.textContent = `${scoreHome} : ${scoreAway}`;
}

// Ball vs player interaction: whichever eligible player is closest to the ball
// becomes the "controller" - the ball is glued just in front of their feet and
// travels with them (real dribble feel) instead of bouncing off their body.
// Anyone else nearby just gets a gentle push-out so bodies don't clip through it.
function resolvePlayerBallCollisions() {
  // Tick down kick cooldowns first (players who just passed/shot can't instantly re-trap the ball)
  for (const p of players) {
    if (p.kickCooldown > 0) p.kickCooldown--;
  }

  // Find the closest cooldown-free player within "control range" of the ball
  const CONTROL_RANGE = 9; // slightly wider reach so the ball feels more attached to the player's feet
  let controller = null, controllerDist = Infinity;
  for (const p of players) {
    if (p.kickCooldown > 0) continue;
    const d = dist(p.x, p.y, ball.x, ball.y);
    if (d < p.r + ball.r + CONTROL_RANGE && d < controllerDist) {
      controller = p;
      controllerDist = d;
    }
  }

  if (controller) {
    const p = controller;
    // Ball sits just ahead of the player, in whichever direction they're currently moving
    // (or facing, if standing still) - this is what makes it feel "stuck to the feet".
    let dirx = p.vx, diry = p.vy;
    const spd = Math.hypot(dirx, diry);
    if (spd < 0.2) { dirx = Math.cos(p.facing); diry = Math.sin(p.facing); }
    else { dirx /= spd; diry /= spd; }
    const stickDist = p.r + ball.r - 2; // slightly closer to the feet so the ball feels more attached while still contestable
    const targetX = p.x + dirx * stickDist;
    const targetY = p.y + diry * stickDist;
    // Ease toward the stuck position (rather than snapping) to keep it smooth
    const ease = 0.5 * dtScale;
    ball.x += (targetX - ball.x) * ease;
    ball.y += (targetY - ball.y) * ease;
    ball.vx = p.vx;
    ball.vy = p.vy;
    lastTouchTeam = p.team;
  }

  // Any other overlapping player (e.g. a defender closing in to challenge) just nudges the ball out
  for (const p of players) {
    if (p === controller) continue;
    const d = dist(p.x, p.y, ball.x, ball.y);
    const minDist = p.r + ball.r;
    if (d < minDist && d > 0.001) {
      const nx = (ball.x - p.x) / d, ny = (ball.y - p.y) / d;
      ball.x = p.x + nx * minDist;
      ball.y = p.y + ny * minDist;
    }
  }
}

// Simple player-vs-player separation so bodies don't overlap
function resolvePlayerPlayerCollisions() {
  for (let i = 0; i < players.length; i++) {
    for (let j = i + 1; j < players.length; j++) {
      const a = players[i], b = players[j];
      const d = dist(a.x, a.y, b.x, b.y);
      const minDist = a.r + b.r;
      if (d < minDist && d > 0.001) {
        const overlap = (minDist - d) / 2;
        const nx = (a.x - b.x) / d, ny = (a.y - b.y) / d;
        a.x += nx * overlap; a.y += ny * overlap;
        b.x -= nx * overlap; b.y -= ny * overlap;
      }
    }
  }
}

// ----------------------------- MAIN UPDATE LOOP ---------------------------
function update() {
  if (goalPauseFrames > 0) { goalPauseFrames--; return; }

  handleControlledPlayer();

  for (let i = 0; i < players.length; i++) {
    if (i === controlledIndex) continue;
    const p = players[i];
    if (p.role === 'GK') { updateGoalkeeper(p); continue; }
    if (p.team === 'home') updateTeammateAI(p);
    else updateOpponentFieldAI(p);
  }

  keepPlayersOutOfGoalZones();
  updateBall();
  resolvePlayerPlayerCollisions();
  resolvePlayerBallCollisions();
}

// ----------------------------- RENDERING ----------------------------------
function drawPitch() {
  // Base grass with subtle mowed-stripe pattern
  for (let i = 0; i < 12; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'var-pitch-dark' : 'var-pitch-light';
    ctx.fillStyle = i % 2 === 0 ? '#0b3d24' : '#0f4d2d';
    ctx.fillRect(FIELD.left + i * (FIELD.width / 12), FIELD.top, FIELD.width / 12, FIELD.height);
  }

  ctx.strokeStyle = '#e8f5ec';
  ctx.lineWidth = 3;

  // Outer boundary
  ctx.strokeRect(FIELD.left, FIELD.top, FIELD.width, FIELD.height);

  // Halfway line
  ctx.beginPath();
  ctx.moveTo(FIELD.centerX, FIELD.top);
  ctx.lineTo(FIELD.centerX, FIELD.bottom);
  ctx.stroke();

  // Center circle + spot
  ctx.beginPath();
  ctx.arc(FIELD.centerX, FIELD.centerY, 60, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FIELD.centerX, FIELD.centerY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#e8f5ec';
  ctx.fill();

  // Penalty boxes (left & right)
  ctx.strokeRect(FIELD.left, FIELD.centerY - BOX.height / 2, BOX.width, BOX.height);
  ctx.strokeRect(FIELD.right - BOX.width, FIELD.centerY - BOX.height / 2, BOX.width, BOX.height);

  // Six-yard boxes
  ctx.strokeRect(FIELD.left, FIELD.centerY - 60, 55, 120);
  ctx.strokeRect(FIELD.right - 55, FIELD.centerY - 60, 55, 120);

  // Goals (rectangles sticking out behind the boundary line)
  ctx.fillStyle = 'rgba(232,245,236,0.15)';
  ctx.strokeStyle = '#dfe8e0';
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD.left - GOAL.depth, GOAL.topY, GOAL.depth, GOAL.bottomY - GOAL.topY);
  ctx.fillRect(FIELD.left - GOAL.depth, GOAL.topY, GOAL.depth, GOAL.bottomY - GOAL.topY);
  ctx.strokeRect(FIELD.right, GOAL.topY, GOAL.depth, GOAL.bottomY - GOAL.topY);
  ctx.fillRect(FIELD.right, GOAL.topY, GOAL.depth, GOAL.bottomY - GOAL.topY);
}

function drawPlayers() {
  players.forEach((p, i) => {
    const isControlled = i === controlledIndex;
    // Controlled-player indicator ring (drawn first, behind the body)
    if (isControlled) {
      ctx.beginPath();
      ctx.arc(p.x, p.y - 22, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#f2c14e';
      ctx.fill();
      ctx.strokeStyle = '#7a5a12';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 16);
      ctx.lineTo(p.x, p.y - 9);
      ctx.strokeStyle = '#f2c14e';
      ctx.stroke();
    }

    // Body
    const isGK = p.role === 'GK';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    if (p.team === 'home') {
      ctx.fillStyle = isGK ? '#0c8c5a' : '#1e5fd9';
    } else {
      ctx.fillStyle = isGK ? '#f2b134' : '#d9291e';
    }
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = p.team === 'home' ? '#0d2a63' : '#5f0e0a';
    ctx.stroke();

    // Jersey number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px Tahoma';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.num, p.x, p.y + 1);

    // Small facing indicator (helps show direction for the controlled player)
    if (isControlled) {
      const fx = p.x + Math.cos(p.facing) * (p.r + 6);
      const fy = p.y + Math.sin(p.facing) * (p.r + 6);
      ctx.beginPath();
      ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
  });
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#222';
  ctx.stroke();
}

function render() {
  drawPitch();
  drawPlayers();
  drawBall();
}

// ----------------------------- MATCH CLOCK --------------------------------
setInterval(() => {
  if (goalPauseFrames === 0) matchSeconds++;
  const m = String(Math.floor(matchSeconds / 60)).padStart(2, '0');
  const s = String(matchSeconds % 60).padStart(2, '0');
  timerEl.textContent = `${m}:${s}`;
}, 1000);

// ----------------------------- GAME LOOP ----------------------------------
let lastTimestamp = null;
function loop(timestamp) {
  if (lastTimestamp === null) lastTimestamp = timestamp;
  const elapsedMs = timestamp - lastTimestamp;
  lastTimestamp = timestamp;
  // Clamp so a dropped/huge frame (e.g. tab switch) can't fling everything across the pitch
  dtScale = clamp(elapsedMs / 16.6667, 0.2, 2.5);

  update();
  render();
  requestAnimationFrame(loop);
}
updateScoreboard();
requestAnimationFrame(loop);
</script>
</body>
</html>
